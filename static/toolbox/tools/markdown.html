<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 预览</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
  /* Override common.css to fill iframe viewport */
  body { min-height: 100vh; height: 100vh; overflow: hidden; }
  .container {
    max-width: none; margin: 0; padding: var(--space-3);
    height: 100%; display: flex; flex-direction: column;
  }
  .card { margin-bottom: 0; }

  .layout {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3);
    flex: 1; min-height: 0;  /* critical: allows grid children to shrink */
  }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  .pane {
    display: flex; flex-direction: column;
    background: var(--bg-surface);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-md);
    overflow: hidden;
    min-height: 0;  /* allows flex child to shrink below content */
  }
  .pane-head {
    padding: var(--space-2) var(--space-3);
    background: var(--bg-page);
    border-bottom: 1px solid var(--border-base);
    font-size: var(--text-xs); font-weight: 700; color: var(--fg-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .pane-head .actions-mini { display: flex; gap: 4px; }
  .pane-head button {
    background: none; border: none; cursor: pointer;
    color: var(--fg-muted); font-size: var(--text-sm);
    padding: 2px 8px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; gap: 4px;
    font-family: inherit;
  }
  .pane-head button:hover { background: var(--bg-surface); color: var(--color-brand); }
  #editor {
    flex: 1; width: 100%; border: none; resize: none;
    padding: var(--space-4);
    font-family: var(--font-mono);
    font-size: var(--text-sm); line-height: 1.6;
    color: var(--fg-base); background: var(--bg-surface);
    outline: none; min-height: 0;
  }
  #preview {
    flex: 1; overflow: auto;
    padding: var(--space-4) var(--space-6);
    color: var(--fg-base);
    font-size: var(--text-md); line-height: 1.7;
    min-height: 0;
  }
  /* Markdown body styles */
  #preview h1, #preview h2, #preview h3, #preview h4 {
    color: var(--fg-strong); margin: 1.2em 0 0.6em; line-height: 1.3;
  }
  #preview h1 { font-size: 1.8em; border-bottom: 1px solid var(--border-base); padding-bottom: 0.3em; }
  #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.25em; }
  #preview h3 { font-size: 1.2em; }
  #preview p { margin: 0.8em 0; }
  #preview a { color: var(--color-brand); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview code {
    font-family: var(--font-mono); font-size: 0.88em;
    background: var(--bg-page); padding: 2px 6px;
    border-radius: var(--radius-sm); color: var(--color-danger);
  }
  #preview pre {
    background: var(--bg-inverse); color: var(--fg-on-inverse);
    padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
    overflow-x: auto; margin: 1em 0;
  }
  #preview pre code { background: transparent; color: inherit; padding: 0; }
  #preview blockquote {
    border-left: 4px solid var(--color-brand);
    margin: 1em 0; padding: 0.3em 1em;
    color: var(--fg-muted); background: var(--bg-page);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  #preview ul, #preview ol { padding-left: 1.6em; margin: 0.8em 0; }
  #preview li { margin: 0.3em 0; }
  #preview table {
    border-collapse: collapse; margin: 1em 0;
    width: 100%; font-size: var(--text-sm);
  }
  #preview th, #preview td {
    border: 1px solid var(--border-base); padding: 6px 10px;
  }
  #preview th { background: var(--bg-page); font-weight: 600; color: var(--fg-strong); }
  #preview tr:nth-child(even) { background: var(--bg-page-2); }
  #preview img { max-width: 100%; border-radius: var(--radius-md); }
  #preview hr { border: none; border-top: 1px solid var(--border-base); margin: 1.5em 0; }
  #preview input[type="checkbox"] { margin-right: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="layout">
    <div class="pane">
      <div class="pane-head">
        <span>Markdown 编辑</span>
        <div class="actions-mini">
          <button id="copyMdBtn" title="复制 Markdown"><i class="mgc_copy_line"></i></button>
          <button id="clearBtn" title="清空"><i class="mgc_delete_2_line"></i></button>
          <button id="loadSampleBtn" title="加载示例">示例</button>
        </div>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="在此输入 Markdown…"></textarea>
    </div>
    <div class="pane">
      <div class="pane-head">
        <span>预览</span>
        <div class="actions-mini">
          <button id="copyHtmlBtn" title="复制 HTML"><i class="mgc_code_line"></i> HTML</button>
          <button id="openNewBtn" title="新窗口打开"><i class="mgc_link_line"></i></button>
        </div>
      </div>
      <div id="preview"></div>
    </div>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';
  var editor = document.getElementById('editor');
  var preview = document.getElementById('preview');

  marked.setOptions({ breaks: true, gfm: true });

  function render() {
    var html = marked.parse(editor.value);
    preview.innerHTML = DOMPurify.sanitize(html);
  }

  var timer;
  editor.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(render, 120);
  });

  document.getElementById('copyMdBtn').addEventListener('click', function() {
    Toolbox.copyText(editor.value, '已复制 Markdown');
  });
  document.getElementById('copyHtmlBtn').addEventListener('click', function() {
    Toolbox.copyText(preview.innerHTML, '已复制 HTML');
  });
  document.getElementById('clearBtn').addEventListener('click', function() {
    editor.value = ''; render();
  });
  document.getElementById('openNewBtn').addEventListener('click', function() {
    var w = window.open();
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>预览</title><style>body{font-family:system-ui,sans-serif;max-width:820px;margin:40px auto;padding:0 20px;line-height:1.7;color:#222}code{background:#f4f4f4;padding:2px 6px;border-radius:4px}pre{background:#1e1e2e;color:#fff;padding:16px;border-radius:8px;overflow-x:auto}pre code{background:transparent;color:inherit;padding:0}blockquote{border-left:4px solid #4f6df5;padding:0.3em 1em;color:#666;background:#f7f7fb;margin:1em 0}table{border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px 10px}th{background:#f4f4f4}img{max-width:100%}a{color:#4f6df5}</style></head><body>' + preview.innerHTML + '</body></html>');
    w.document.close();
  });

  var SAMPLE = '# 欢迎使用 Markdown 预览\n\n' +
    '这是一个**实时预览**工具，左侧编辑，右侧即时渲染。\n\n' +
    '## 功能特性\n\n- 支持 GFM 语法（表格、任务列表、删除线）\n- 代码高亮（基于样式）\n- 实时渲染（输入停顿 120ms）\n- 一键复制 HTML\n\n' +
    '### 示例代码\n\n```js\nfunction hello() {\n  console.log("Hello, Markdown!");\n}\n```\n\n' +
    '### 表格\n\n| 工具 | 用途 | 实现 |\n|---|---|---|\n| Markdown 预览 | 实时渲染 | marked + DOMPurify |\n| JSON 格式化 | 美化 JSON | JSON.stringify |\n\n' +
    '### 任务列表\n\n- [x] 实时预览\n- [x] 复制 HTML\n- [x] 新窗口打开\n- [ ] 导出 PDF\n\n' +
    '> 提示：所有内容仅在本地处理，不会上传。\n';

  document.getElementById('loadSampleBtn').addEventListener('click', function() {
    editor.value = SAMPLE; render();
  });

  editor.value = SAMPLE;
  render();
})();
</script>
</body>
</html>
