<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编解码</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  textarea { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="tool-header">
      <h2><i class="mgc_lock_line"></i> Base64 编解码</h2>
      <p>对文本进行 Base64 编码或解码</p>
    </div>
    <textarea id="input" placeholder="输入要编码或解码的文本…"></textarea>
    <div class="actions">
      <button class="btn" id="encodeBtn"><i class="mgc_lock_line"></i> 编码</button>
      <button class="btn" id="decodeBtn"><i class="mgc_unlock_line"></i> 解码</button>
      <button class="btn secondary" id="clearBtn"><i class="mgc_delete_2_line"></i> 清空</button>
    </div>
    <div class="error" id="error"></div>
  </div>
  <div class="card" id="resultCard" style="display:none;">
    <div class="tool-header">
      <h2><i class="mgc_copy_2_line"></i> 结果</h2>
    </div>
    <textarea id="output" readonly></textarea>
    <div class="actions">
      <button class="btn" id="copyBtn"><i class="mgc_copy_2_line"></i> 复制结果</button>
    </div>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';
  var input = document.getElementById('input');
  var output = document.getElementById('output');
  var resultCard = document.getElementById('resultCard');
  var error = document.getElementById('error');

  document.getElementById('encodeBtn').addEventListener('click', function() {
    error.textContent = '';
    var text = input.value;
    if (!text) { Toolbox.showToast('请输入内容'); return; }
    try {
      output.value = btoa(unescape(encodeURIComponent(text)));
      resultCard.style.display = '';
    } catch (e) {
      error.textContent = '❌ 编码失败：' + e.message;
      resultCard.style.display = 'none';
    }
  });

  document.getElementById('decodeBtn').addEventListener('click', function() {
    error.textContent = '';
    var text = input.value.trim();
    if (!text) { Toolbox.showToast('请输入内容'); return; }
    try {
      output.value = decodeURIComponent(escape(atob(text)));
      resultCard.style.display = '';
    } catch (e) {
      error.textContent = '❌ 解码失败：输入不是有效的 Base64 字符串';
      resultCard.style.display = 'none';
    }
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    input.value = ''; output.value = ''; error.textContent = ''; resultCard.style.display = 'none'; Toolbox.showToast('已清空');
  });

  document.getElementById('copyBtn').addEventListener('click', function() {
    Toolbox.copyText(output.value, '已复制到剪贴板');
  });
})();
</script>
</body>
</html>
