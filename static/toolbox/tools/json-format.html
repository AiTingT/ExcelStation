<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 格式化</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  textarea { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="tool-header">
      <h2><i class="mgc_code_line"></i> JSON 格式化</h2>
      <p>格式化、压缩 JSON，并检测语法错误</p>
    </div>
    <textarea id="input" placeholder='在此输入 JSON，例如 {"name":"Tom","age":18}'></textarea>
    <div class="actions">
      <button class="btn" id="formatBtn"><i class="mgc_sparkles_line"></i> 格式化</button>
      <button class="btn" id="compactBtn"><i class="mgc_compress_line"></i> 压缩</button>
      <button class="btn secondary" id="clearBtn"><i class="mgc_delete_2_line"></i> 清空</button>
    </div>
    <div class="error" id="error"></div>
  </div>
  <div class="card" id="resultCard" style="display:none;">
    <div class="tool-header">
      <h2><i class="mgc_copy_2_line"></i> 结果</h2>
    </div>
    <textarea id="output" readonly></textarea>
    <div class="actions">
      <button class="btn" id="copyBtn"><i class="mgc_copy_2_line"></i> 复制结果</button>
    </div>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';
  var input = document.getElementById('input');
  var output = document.getElementById('output');
  var resultCard = document.getElementById('resultCard');
  var error = document.getElementById('error');

  function processJSON(compact) {
    error.textContent = '';
    var text = input.value.trim();
    if (!text) { Toolbox.showToast('请输入 JSON'); return; }
    try {
      var obj = JSON.parse(text);
      var res = compact ? JSON.stringify(obj) : JSON.stringify(obj, null, 2);
      output.value = res;
      resultCard.style.display = '';
    } catch (e) {
      error.textContent = '❌ JSON 语法错误：' + e.message;
      resultCard.style.display = 'none';
    }
  }

  document.getElementById('formatBtn').addEventListener('click', function() { processJSON(false); });
  document.getElementById('compactBtn').addEventListener('click', function() { processJSON(true); });
  document.getElementById('clearBtn').addEventListener('click', function() {
    input.value = ''; output.value = ''; error.textContent = ''; resultCard.style.display = 'none'; Toolbox.showToast('已清空');
  });
  document.getElementById('copyBtn').addEventListener('click', function() {
    Toolbox.copyText(output.value, '已复制到剪贴板');
  });
})();
</script>
</body>
</html>
