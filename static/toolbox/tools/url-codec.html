<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL 编解码</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  textarea { font-family: var(--font-mono); min-height: 120px; }
  .tabs { display: flex; gap: 2px; margin-bottom: var(--space-4); }
  .tab {
    padding: 6px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-base); background: var(--bg-page);
    cursor: pointer; font-size: var(--text-sm); color: var(--fg-base);
    font-family: inherit;
  }
  .tab.active { background: var(--color-brand); color: #fff; border-color: var(--color-brand); }
  .panel-title { font-size: var(--text-sm); color: var(--fg-muted); margin-bottom: var(--space-2); font-weight: 600; }
  .query-table {
    width: 100%; border-collapse: collapse; margin-top: var(--space-3);
  }
  .query-table th {
    text-align: left; font-size: var(--text-xs); color: var(--fg-muted);
    padding: 6px 10px; border-bottom: 1px solid var(--border-base);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .query-table td { padding: 6px; border-bottom: 1px solid var(--border-subtle); }
  .query-table input {
    width: 100%; padding: 6px 10px;
    border: 1px solid var(--border-base); border-radius: var(--radius-sm);
    background: var(--bg-page); color: var(--fg-base);
    font-family: var(--font-mono); font-size: var(--text-sm);
  }
  .query-table .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--fg-muted); padding: 4px; border-radius: var(--radius-sm);
  }
  .query-table .del-btn:hover { color: var(--color-danger); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="tool-header">
      <h2><i class="mgc_link_line"></i> URL 编解码</h2>
      <p>URL 编码 / 解码，以及 query string 可视化编辑</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-mode="codec">编解码</button>
      <button class="tab" data-mode="query">Query String 解析</button>
    </div>

    <!-- 编解码面板 -->
    <div id="codecPanel">
      <div class="panel-title">输入</div>
      <textarea id="input" placeholder="输入 URL 或文本…"></textarea>
      <div class="actions">
        <button class="btn" id="encodeBtn"><i class="mgc_lock_line"></i> 编码</button>
        <button class="btn" id="encodeCompBtn"><i class="mgc_lock_line"></i> 组件编码</button>
        <button class="btn" id="decodeBtn"><i class="mgc_unlock_line"></i> 解码</button>
        <button class="btn secondary" id="clearBtn"><i class="mgc_delete_2_line"></i> 清空</button>
      </div>
      <div class="panel-title" style="margin-top: var(--space-4);">输出</div>
      <textarea id="output" readonly placeholder="结果将显示在此…"></textarea>
      <div class="actions">
        <button class="btn" id="copyBtn"><i class="mgc_copy_2_line"></i> 复制结果</button>
      </div>
      <div class="error" id="error"></div>
    </div>

    <!-- Query String 面板 -->
    <div id="queryPanel" style="display:none;">
      <div class="panel-title">URL / Query String</div>
      <textarea id="queryInput" placeholder="?name=Tom&age=20 或完整 URL…"></textarea>
      <div class="actions">
        <button class="btn" id="parseBtn"><i class="mgc_list_check_line"></i> 解析</button>
        <button class="btn" id="buildBtn"><i class="mgc_edit_line"></i> 从表格生成</button>
      </div>
      <div id="queryResult"></div>
    </div>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';

  var tabs = document.querySelectorAll('.tab');
  var codecPanel = document.getElementById('codecPanel');
  var queryPanel = document.getElementById('queryPanel');
  tabs.forEach(function(t) {
    t.addEventListener('click', function() {
      tabs.forEach(function(x) { x.classList.toggle('active', x === t); });
      var m = t.dataset.mode;
      codecPanel.style.display = m === 'codec' ? '' : 'none';
      queryPanel.style.display = m === 'query' ? '' : 'none';
    });
  });

  // Codec
  var input = document.getElementById('input');
  var output = document.getElementById('output');
  var error = document.getElementById('error');

  function run(fn) {
    error.textContent = '';
    try { output.value = fn(input.value); }
    catch (e) { error.textContent = '❌ ' + e.message; output.value = ''; }
  }
  document.getElementById('encodeBtn').addEventListener('click', function() { run(encodeURI); });
  document.getElementById('encodeCompBtn').addEventListener('click', function() { run(encodeURIComponent); });
  document.getElementById('decodeBtn').addEventListener('click', function() {
    error.textContent = '';
    try { output.value = decodeURIComponent(input.value); }
    catch (e) { error.textContent = '❌ 解码失败：' + e.message; output.value = ''; }
  });
  document.getElementById('clearBtn').addEventListener('click', function() {
    input.value = ''; output.value = ''; error.textContent = '';
  });
  document.getElementById('copyBtn').addEventListener('click', function() {
    Toolbox.copyText(output.value, '已复制');
  });

  // Query String
  var queryInput = document.getElementById('queryInput');
  var queryResult = document.getElementById('queryResult');
  var currentPairs = [];

  function parseQS(s) {
    var q = s.trim();
    // 如果包含 ?，取后面的部分
    var idx = q.indexOf('?');
    if (idx !== -1) q = q.substring(idx + 1);
    if (!q) return [];
    return q.split('&').map(function(p) {
      var eq = p.indexOf('=');
      if (eq === -1) return { key: p, value: '' };
      return { key: decodeURIComponent(p.substring(0, eq)), value: decodeURIComponent(p.substring(eq + 1)) };
    });
  }

  function renderTable(pairs) {
    currentPairs = pairs;
    if (!pairs.length) { queryResult.innerHTML = '<div class="error">未解析到参数</div>'; return; }
    var html = '<table class="query-table"><thead><tr><th style="width:40%">Key</th><th>Value</th><th style="width:40px"></th></tr></thead><tbody>';
    pairs.forEach(function(p, i) {
      html += '<tr data-idx="' + i + '">' +
        '<td><input class="k" value="' + escapeAttr(p.key) + '"></td>' +
        '<td><input class="v" value="' + escapeAttr(p.value) + '"></td>' +
        '<td><button class="del-btn" title="删除"><i class="mgc_delete_2_line"></i></button></td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    html += '<div class="actions" style="margin-top: var(--space-3);">' +
      '<button class="btn secondary" id="addRowBtn"><i class="mgc_add_line"></i> 添加</button>' +
      '<button class="btn" id="copyQsBtn"><i class="mgc_copy_2_line"></i> 复制 URL</button>' +
    '</div>';
    queryResult.innerHTML = html;
    queryResult.querySelectorAll('.del-btn').forEach(function(b) {
      b.addEventListener('click', function() {
        var idx = parseInt(b.closest('tr').dataset.idx);
        pairs.splice(idx, 1);
        renderTable(pairs);
      });
    });
    queryResult.querySelectorAll('input').forEach(function(inp) {
      inp.addEventListener('input', function() {
        var tr = inp.closest('tr');
        var i = parseInt(tr.dataset.idx);
        pairs[i].key = tr.querySelector('.k').value;
        pairs[i].value = tr.querySelector('.v').value;
      });
    });
    var addBtn = document.getElementById('addRowBtn');
    if (addBtn) addBtn.addEventListener('click', function() { pairs.push({key:'', value:''}); renderTable(pairs); });
    var copyBtn = document.getElementById('copyQsBtn');
    if (copyBtn) copyBtn.addEventListener('click', function() {
      Toolbox.copyText(buildQS(pairs), '已复制');
    });
  }

  function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
  function buildQS(pairs) {
    return pairs.map(function(p) {
      return encodeURIComponent(p.key) + '=' + encodeURIComponent(p.value);
    }).join('&');
  }

  document.getElementById('parseBtn').addEventListener('click', function() {
    renderTable(parseQS(queryInput.value));
  });
  document.getElementById('buildBtn').addEventListener('click', function() {
    if (!currentPairs.length) {
      var src = parseQS(queryInput.value);
      if (src.length) { currentPairs = src; }
    }
    queryInput.value = '?' + buildQS(currentPairs);
    Toolbox.showToast('已生成');
  });
})();
</script>
</body>
</html>
