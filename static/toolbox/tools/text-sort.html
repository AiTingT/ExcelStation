<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本排序</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  textarea { font-family: var(--font-mono); }
  .opts { display: flex; flex-wrap: wrap; gap: var(--space-4); margin-bottom: var(--space-3); align-items: center; }
  .opt { display: inline-flex; align-items: center; gap: 6px; font-size: var(--text-sm); color: var(--fg-base); }
  .opt select { width: auto; padding: 4px 10px; }
  .opt input[type="checkbox"] { width: 16px; height: 16px; }
  .stats { font-size: var(--text-sm); color: var(--fg-muted); margin-bottom: var(--space-2); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="tool-header">
      <h2><i class="mgc_sort_ascending_line"></i> 文本排序</h2>
      <p>每行一条文本，按指定方式排序</p>
    </div>
    <div class="opts">
      <label class="opt">排序方式
        <select id="sortBy">
          <option value="pinyin">拼音</option>
          <option value="stroke">笔画</option>
          <option value="length">字数（短→长）</option>
          <option value="original">原始顺序</option>
        </select>
      </label>
      <label class="opt"><input type="checkbox" id="desc"> 降序</label>
      <label class="opt"><input type="checkbox" id="trim" checked> 忽略首尾空格</label>
    </div>
    <textarea id="input" placeholder="每行一条文本…"></textarea>
    <div class="actions">
      <button class="btn" id="runBtn"><i class="mgc_play_line"></i> 排序</button>
      <button class="btn secondary" id="copyBtn"><i class="mgc_copy_line"></i> 复制结果</button>
      <button class="btn secondary" id="clearBtn"><i class="mgc_delete_2_line"></i> 清空</button>
    </div>
  </div>
  <div class="card">
    <div class="tool-header"><h2><i class="mgc_list_check_line"></i> 结果</h2></div>
    <div class="stats" id="stats"></div>
    <textarea id="output" placeholder="排序后结果…" readonly></textarea>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';
  var input = document.getElementById('input');
  var output = document.getElementById('output');
  var stats = document.getElementById('stats');

  document.getElementById('runBtn').addEventListener('click', function() {
    var sortBy = document.getElementById('sortBy').value;
    var desc = document.getElementById('desc').checked;
    var trim = document.getElementById('trim').checked;
    var lines = input.value.split(/\r?\n/);
    if (trim) lines = lines.map(function(s){return s.trim();});
    lines = lines.filter(function(s){return s.length > 0;});
    var origCount = lines.length;
    if (sortBy === 'pinyin') {
      lines.sort(function(a,b){ return a.localeCompare(b, 'zh-Hans-CN'); });
    } else if (sortBy === 'stroke') {
      lines.sort(function(a,b){ return a.localeCompare(b, 'zh-Hans-CN-u-co-stroke'); });
    } else if (sortBy === 'length') {
      lines.sort(function(a,b){ return a.length - b.length; });
    }
    if (desc && sortBy !== 'original') lines.reverse();
    output.value = lines.join('\n');
    stats.textContent = '共 ' + origCount + ' 行' + (desc ? '（降序）' : '');
  });
  document.getElementById('copyBtn').addEventListener('click', function() {
    if (!output.value) { Toolbox.showToast('没有可复制的内容'); return; }
    Toolbox.copyText(output.value, '已复制');
  });
  document.getElementById('clearBtn').addEventListener('click', function() {
    input.value = ''; output.value = ''; stats.textContent = ''; Toolbox.showToast('已清空');
  });
})();
</script>
</body>
</html>
