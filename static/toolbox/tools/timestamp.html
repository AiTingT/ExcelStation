<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间戳转换</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@2.9.72/font/Mingcute.min.css">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="tool-header">
      <h2><i class="mgc_time_line"></i> 时间戳转换</h2>
      <p>时间戳与日期时间互相转换</p>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="tool-header"><h3><i class="mgc_calendar_line"></i> 时间戳 → 日期</h3></div>
      <div class="field"><label>时间戳（秒或毫秒）</label><input type="text" id="tsInput" placeholder="例如 1710000000 或 1710000000000"></div>
      <div class="actions">
        <button class="btn" id="tsToDate"><i class="mgc_transfer_3_line"></i> 转换</button>
        <button class="btn secondary" id="useNowTs"><i class="mgc_time_line"></i> 使用当前时间戳</button>
      </div>
      <div class="result-box" id="resTs" style="display:none;"><span class="big" id="valTs"></span></div>
      <div class="error" id="errTs"></div>
    </div>

    <div class="card" style="margin-bottom:0;">
      <div class="tool-header"><h3><i class="mgc_calendar_2_line"></i> 日期 → 时间戳</h3></div>
      <div class="field"><label>日期时间</label><input type="datetime-local" id="dateInput"></div>
      <div class="actions">
        <button class="btn" id="dateToTs"><i class="mgc_transfer_3_line"></i> 转换</button>
        <button class="btn secondary" id="useNowDate"><i class="mgc_time_line"></i> 使用当前时间</button>
      </div>
      <div class="result-box" id="resDate" style="display:none;">
        <div>秒级时间戳：<span class="big" id="valDateS"></span></div>
        <div style="margin-top:6px;">毫秒级时间戳：<span class="big" id="valDateMs"></span></div>
      </div>
      <div class="error" id="errDate"></div>
    </div>
  </div>
</div>
<script src="../js/common.js"></script>
<script>
(function() {
  'use strict';

  function pad(n) { return n < 10 ? '0'+n : n; }
  function fmtDate(d) {
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  document.getElementById('tsToDate').addEventListener('click', function() {
    var v = document.getElementById('tsInput').value.trim();
    document.getElementById('errTs').textContent = '';
    if (!v) { Toolbox.showToast('请输入时间戳'); return; }
    var n = parseFloat(v);
    if (isNaN(n)) { document.getElementById('errTs').textContent = '❌ 无效的时间戳'; document.getElementById('resTs').style.display='none'; return; }
    var ms = n < 1e11 ? n * 1000 : n;
    var d = new Date(ms);
    if (isNaN(d.getTime())) { document.getElementById('errTs').textContent = '❌ 无效的时间戳'; document.getElementById('resTs').style.display='none'; return; }
    document.getElementById('valTs').textContent = fmtDate(d) + ' （毫秒: ' + ms + '）';
    document.getElementById('resTs').style.display = '';
  });

  document.getElementById('useNowTs').addEventListener('click', function() {
    var s = Math.floor(Date.now() / 1000);
    document.getElementById('tsInput').value = s;
    document.getElementById('tsToDate').click();
  });

  document.getElementById('dateToTs').addEventListener('click', function() {
    var v = document.getElementById('dateInput').value;
    document.getElementById('errDate').textContent = '';
    if (!v) { Toolbox.showToast('请选择日期时间'); return; }
    var d = new Date(v);
    if (isNaN(d.getTime())) { document.getElementById('errDate').textContent = '❌ 无效的日期'; document.getElementById('resDate').style.display='none'; return; }
    var ms = d.getTime();
    document.getElementById('valDateS').textContent = Math.floor(ms / 1000);
    document.getElementById('valDateMs').textContent = ms;
    document.getElementById('resDate').style.display = '';
  });

  document.getElementById('useNowDate').addEventListener('click', function() {
    var now = new Date();
    var s = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + 'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('dateInput').value = s;
    document.getElementById('dateToTs').click();
  });
})();
</script>
</body>
</html>
